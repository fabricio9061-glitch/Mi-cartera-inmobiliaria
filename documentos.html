<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentos | MALAVE</title>
  <link rel="icon" type="image/png" href="iso-malave.png">
  <meta name="theme-color" content="#243447">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body{ background:var(--gray-50,#f5f6f8); }
    .tp-header{ background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.08); position:sticky; top:0; z-index:1000; }
    .tp-header-inner{ max-width:1080px; margin:0 auto; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; }
    .tp-back{ display:inline-flex; align-items:center; gap:8px; color:var(--gray-600,#555); font-size:14px; font-weight:500; padding:9px 18px; border:1px solid var(--gray-300,#ddd); border-radius:999px; cursor:pointer; background:none; text-decoration:none; transition:all .25s; }
    .tp-back:hover{ background:var(--primary,#16273f); color:#fff; border-color:var(--primary,#16273f); }
    .tp-wrap{ max-width:1080px; margin:0 auto; padding:32px 24px 70px; }
    .tp-state{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; color:var(--gray-500,#888); padding:40px 20px; }
    .tp-state i{ font-size:56px; margin-bottom:20px; opacity:.4; }
    .tp-state h2{ font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--gray-700,#444); margin-bottom:10px; }
    .tp-state a{ display:inline-block; margin-top:18px; background:var(--primary,#16273f); color:#fff; padding:11px 26px; border-radius:999px; text-decoration:none; }
    .tp-spinner{ width:46px; height:46px; border:4px solid var(--gray-200,#eee); border-top-color:var(--primary,#16273f); border-radius:50%; animation:tpspin 1s linear infinite; margin-bottom:18px; }
    @keyframes tpspin{ to{ transform:rotate(360deg); } }
    .pa-page-head{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:22px; }
    .pa-page-ic{ width:56px; height:56px; border-radius:15px; background:linear-gradient(135deg,#101d30,var(--primary,#16273f)); color:#C9A227; display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex:0 0 auto; }
    .pa-page-title{ font-family:'Cormorant Garamond',serif; font-size:2rem; color:var(--primary,#16273f); margin:0; font-weight:700; }
    .pa-page-sub{ color:var(--gray-500,#8a8a8a); margin:4px 0 0; font-size:.92rem; max-width:560px; }
    .pa-add{ margin-left:auto; background:var(--primary,#16273f); color:#fff; border:none; border-radius:11px; padding:11px 20px; font-family:inherit; font-size:.92rem; cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition:transform .15s; }
    .pa-add:hover{ transform:translateY(-1px); }
    .pa-search-row{ display:flex; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
    .pa-search{ flex:1; min-width:220px; position:relative; }
    .pa-search i{ position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--gray-400,#aaa); }
    .pa-search input{ width:100%; padding:12px 14px 12px 40px; border:1px solid var(--gray-200,#e3e6ea); border-radius:11px; font-family:inherit; font-size:.95rem; }
    .pa-search input:focus{ outline:none; border-color:#C9A227; }
    .pa-filter{ border:1px solid var(--gray-200,#e3e6ea); border-radius:11px; padding:12px 14px; font-family:inherit; font-size:.95rem; background:#fff; }
    .doc-cat{ margin:18px 0 10px; font-size:.78rem; letter-spacing:.1em; text-transform:uppercase; color:var(--gray-500,#8a8a8a); font-weight:600; }
    .doc-cat:first-child{ margin-top:0; }
    .doc-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
    .doc-card{ background:#fff; border:1px solid var(--gray-200,#eceef1); border-radius:14px; padding:18px; display:flex; flex-direction:column; gap:12px; }
    .doc-top{ display:flex; align-items:center; gap:13px; }
    .doc-ic{ width:48px; height:48px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex:0 0 auto; color:#fff; }
    .doc-ic.pdf{ background:#c0392b; } .doc-ic.img{ background:#2980b9; } .doc-ic.doc{ background:#2c5aa0; } .doc-ic.xls{ background:#27865a; } .doc-ic.other{ background:var(--primary,#16273f); }
    .doc-name{ flex:1; min-width:0; }
    .doc-name strong{ display:block; font-size:1rem; color:var(--primary,#16273f); line-height:1.3; word-break:break-word; }
    .doc-name span{ display:block; font-size:.74rem; color:var(--gray-500,#8a8a8a); margin-top:3px; }
    .doc-desc{ font-size:.84rem; color:var(--gray-600,#555); line-height:1.5; margin:0; }
    .doc-actions{ display:flex; gap:8px; margin-top:auto; }
    .doc-dl{ flex:1; background:var(--primary,#16273f); color:#fff; border:none; border-radius:9px; padding:10px; font-family:inherit; font-size:.86rem; cursor:pointer; text-decoration:none; text-align:center; display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:filter .15s; }
    .doc-dl:hover{ filter:brightness(1.1); }
    .doc-admin{ display:flex; gap:8px; }
    .doc-admin button{ background:#fff; border:1px solid var(--gray-200,#e3e6ea); border-radius:9px; padding:10px 12px; cursor:pointer; font-size:.85rem; color:var(--gray-600,#555); transition:all .15s; }
    .doc-admin button:hover{ border-color:#C9A227; color:#C9A227; }
    .doc-admin button.de:hover{ border-color:#e3a9a2; color:#c0392b; background:#fff0ee; }
    .pa-empty{ grid-column:1/-1; text-align:center; padding:40px; color:var(--gray-500,#888); }
    .pa-modal{ position:fixed; inset:0; background:rgba(16,29,48,.55); display:none; align-items:center; justify-content:center; z-index:2000; padding:20px; }
    .pa-modal.open{ display:flex; }
    .pa-modal-box{ background:#fff; border-radius:16px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; padding:24px; }
    .pa-modal-box h2{ font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--primary,#16273f); margin:0 0 18px; }
    .pa-fg{ margin-bottom:14px; }
    .pa-fg label{ display:block; font-size:.82rem; color:var(--gray-600,#555); margin-bottom:6px; }
    .pa-fg input, .pa-fg select, .pa-fg textarea{ width:100%; padding:11px 12px; border:1px solid var(--gray-200,#e3e6ea); border-radius:10px; font-family:inherit; font-size:.92rem; }
    .pa-fg input[type=file]{ padding:9px; }
    .pa-fg input:focus, .pa-fg select:focus, .pa-fg textarea:focus{ outline:none; border-color:#C9A227; }
    .pa-fg small{ color:var(--gray-400,#aaa); font-size:.78rem; }
    .pa-save{ width:100%; background:var(--primary,#16273f); color:#fff; border:none; border-radius:11px; padding:13px; font-family:inherit; font-size:.95rem; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:9px; }
    .pa-save:disabled{ opacity:.6; cursor:not-allowed; }
    .pa-prog{ height:6px; background:var(--gray-200,#eee); border-radius:99px; overflow:hidden; margin-top:10px; display:none; }
    .pa-prog.show{ display:block; }
    .pa-prog-bar{ height:100%; width:0; background:#C9A227; transition:width .2s; }
    .toast-container{ position:fixed; bottom:20px; right:20px; z-index:3000; }
    @media (max-width:560px){ .pa-page-title{ font-size:1.6rem; } .doc-grid{ grid-template-columns:1fr; } .pa-add{ margin-left:0; width:100%; justify-content:center; } }
  </style>
</head>
<body>
  <header class="tp-header">
    <div class="tp-header-inner">
      <a href="index.html" class="logo"><img src="iso-malave.png" alt="" class="logo-img"><img src="texto-malave.png" alt="MALAVE" class="logo-text"></a>
      <a href="index.html" class="tp-back"><i class="fas fa-arrow-left"></i> Volver</a>
    </div>
  </header>

  <div id="tpLoading" class="tp-state"><div class="tp-spinner"></div><p>Verificando sesion...</p></div>
  <div id="tpAuth" class="tp-state" style="display:none">
    <i class="fas fa-lock"></i>
    <h2 id="tpAuthTitle">Acceso para agentes</h2>
    <p id="tpAuthMsg">Inicia sesion para ver los documentos.</p>
    <a href="index.html"><i class="fas fa-arrow-left"></i> Ir al inicio</a>
  </div>

  <div class="tp-wrap" id="tpContent" style="display:none">
    <div class="pa-page-head">
      <div class="pa-page-ic"><i class="fas fa-folder-open"></i></div>
      <div><h1 class="pa-page-title">Documentos</h1><p class="pa-page-sub">Compromisos de calidad, contratos modelo y documentos oficiales de la inmobiliaria. Descargalos cuando los necesites.</p></div>
      <button class="pa-add" id="docAddBtn" style="display:none" onclick="openDocModal()"><i class="fas fa-plus"></i> Subir documento</button>
    </div>
    <div class="pa-search-row">
      <div class="pa-search"><i class="fas fa-search"></i><input type="text" id="docSearch" placeholder="Buscar documento..." oninput="renderDocs()"></div>
      <select class="pa-filter" id="docFilter" onchange="renderDocs()"><option value="">Todas las categorias</option><option value="exclusivo">Compromiso exclusivo</option><option value="no_exclusivo">Compromiso no exclusivo</option><option value="contrato">Contratos modelo</option><option value="otro">Otros</option></select>
    </div>
    <div id="docList"></div>
  </div>

  <div class="pa-modal" id="docModal">
    <div class="pa-modal-box">
      <h2 id="docModalTitle">Subir documento</h2>
      <input type="hidden" id="docEditId">
      <div class="pa-fg"><label>Categoria</label><select id="docCategory"><option value="exclusivo">Compromiso exclusivo</option><option value="no_exclusivo">Compromiso no exclusivo</option><option value="contrato">Contratos modelo</option><option value="otro">Otros</option></select></div>
      <div class="pa-fg"><label>Nombre del documento</label><input type="text" id="docName" placeholder="Ej: Compromiso de calidad exclusivo 2026"></div>
      <div class="pa-fg"><label>Descripcion (opcional)</label><textarea id="docDesc" rows="2" placeholder="Notas, version, etc."></textarea></div>
      <div class="pa-fg"><label>Archivo <small id="docFileHint">(PDF, imagen o Word)</small></label><input type="file" id="docFile" accept=".pdf,.doc,.docx,.xls,.xlsx,image/*"></div>
      <div class="pa-prog" id="docProg"><div class="pa-prog-bar" id="docProgBar"></div></div>
      <button class="pa-save" id="docSaveBtn" onclick="saveDoc()"><i class="fas fa-save"></i> Guardar</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDnCQLlJuBtZqXNwYILio9a8ltb972bXzQ",
      authDomain: "mi-cartera-inmobiliaria.firebaseapp.com",
      projectId: "mi-cartera-inmobiliaria",
      storageBucket: "mi-cartera-inmobiliaria.firebasestorage.app",
      messagingSenderId: "923595024127",
      appId: "1:923595024127:web:b7104adcba6387a5a84eca"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore(), storage = firebase.storage();
    const ADMIN_EMAIL = "fabricio9061@gmail.com";
    let esAdmin = false, docs = [];

    function tpShow(which) {
      ['tpLoading', 'tpAuth', 'tpContent'].forEach(id => document.getElementById(id).style.display = 'none');
      document.getElementById(which).style.display = which === 'tpContent' ? 'block' : 'flex';
    }
    const escH = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const escA = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    const CAT_LABELS = { exclusivo: 'Compromisos exclusivos', no_exclusivo: 'Compromisos no exclusivos', contrato: 'Contratos modelo', otro: 'Otros' };

    function iconFor(ext) {
      ext = (ext || '').toLowerCase();
      if (ext === 'pdf') return ['pdf', 'fa-file-pdf'];
      if (['jpg','jpeg','png','webp','gif'].includes(ext)) return ['img', 'fa-file-image'];
      if (['doc','docx'].includes(ext)) return ['doc', 'fa-file-word'];
      if (['xls','xlsx','csv'].includes(ext)) return ['xls', 'fa-file-excel'];
      return ['other', 'fa-file'];
    }
    function fmtSize(b) { if (!b) return ''; const k = b / 1024; return k < 1024 ? k.toFixed(0) + ' KB' : (k / 1024).toFixed(1) + ' MB'; }

    function renderDocs() {
      const list = document.getElementById('docList');
      const term = (document.getElementById('docSearch').value || '').toLowerCase().trim();
      const filt = document.getElementById('docFilter').value || '';
      let items = docs.slice();
      if (filt) items = items.filter(d => (d.category || 'otro') === filt);
      if (term) items = items.filter(d => ((d.name || '') + ' ' + (d.description || '')).toLowerCase().includes(term));
      if (!items.length) { list.innerHTML = `<p class="pa-empty">No hay documentos que coincidan.${esAdmin && !docs.length ? ' Subi el primero con el boton de arriba.' : ''}</p>`; return; }
      const card = d => {
        const [cls, ic] = iconFor(d.ext);
        return `<div class="doc-card">
          <div class="doc-top"><div class="doc-ic ${cls}"><i class="fas ${ic}"></i></div>
            <div class="doc-name"><strong>${escH(d.name) || 'Documento'}</strong><span>${(d.ext || '').toUpperCase()}${d.size ? ' &middot; ' + fmtSize(d.size) : ''}${d.createdAt ? ' &middot; ' + new Date(d.createdAt).toLocaleDateString('es-UY') : ''}</span></div></div>
          ${d.description ? `<p class="doc-desc">${escH(d.description)}</p>` : ''}
          <div class="doc-actions">
            <a class="doc-dl" href="${escA(d.url)}" target="_blank" rel="noopener"><i class="fas fa-download"></i> Descargar</a>
            ${esAdmin ? `<div class="doc-admin"><button onclick="openDocModal('${d.id}')" title="Editar datos"><i class="fas fa-edit"></i></button><button class="de" onclick="deleteDoc('${d.id}')" title="Eliminar"><i class="fas fa-trash"></i></button></div>` : ''}
          </div>
        </div>`;
      };
      let html = '';
      Object.keys(CAT_LABELS).forEach(k => {
        const sub = items.filter(d => (d.category || 'otro') === k);
        if (!sub.length) return;
        if (!filt) html += `<div class="doc-cat">${CAT_LABELS[k]}</div>`;
        html += '<div class="doc-grid">' + sub.map(card).join('') + '</div>';
      });
      list.innerHTML = html;
    }

    function openDocModal(id) {
      if (!esAdmin) return;
      const d = id ? docs.find(x => x.id === id) : null;
      document.getElementById('docEditId').value = id || '';
      document.getElementById('docModalTitle').textContent = d ? 'Editar documento' : 'Subir documento';
      document.getElementById('docCategory').value = d ? (d.category || 'otro') : 'exclusivo';
      document.getElementById('docName').value = d ? (d.name || '') : '';
      document.getElementById('docDesc').value = d ? (d.description || '') : '';
      document.getElementById('docFile').value = '';
      document.getElementById('docFileHint').textContent = d ? '(opcional: dejalo vacio para conservar el archivo actual)' : '(PDF, imagen o Word)';
      document.getElementById('docProg').classList.remove('show');
      document.getElementById('docProgBar').style.width = '0';
      document.getElementById('docModal').classList.add('open');
    }
    function closeDocModal() { document.getElementById('docModal').classList.remove('open'); }
    document.getElementById('docModal').addEventListener('click', e => { if (e.target.id === 'docModal') closeDocModal(); });

    async function saveDoc() {
      if (!esAdmin) return;
      const id = document.getElementById('docEditId').value;
      const name = document.getElementById('docName').value.trim();
      const category = document.getElementById('docCategory').value;
      const description = document.getElementById('docDesc').value.trim();
      const file = document.getElementById('docFile').files[0];
      if (!name) { showToast('Falta el nombre', 'Poné un nombre al documento.', 'fa-circle-exclamation'); return; }
      if (!id && !file) { showToast('Falta el archivo', 'Elegí un archivo para subir.', 'fa-circle-exclamation'); return; }
      const btn = document.getElementById('docSaveBtn'); btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
      try {
        const data = { name, category, description, updatedAt: new Date().toISOString() };
        if (file) {
          const ext = (file.name.split('.').pop() || '').toLowerCase();
          const path = `documentos/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
          const ref = storage.ref(path);
          const prog = document.getElementById('docProg'), bar = document.getElementById('docProgBar');
          prog.classList.add('show');
          const task = ref.put(file);
          await new Promise((res, rej) => {
            task.on('state_changed', s => { bar.style.width = (s.bytesTransferred / s.totalBytes * 100) + '%'; }, rej, res);
          });
          data.url = await task.snapshot.ref.getDownloadURL();
          data.storagePath = path;
          data.ext = ext;
          data.size = file.size;
        }
        if (id) {
          await db.collection('documentos').doc(id).update(data);
        } else {
          data.createdAt = new Date().toISOString();
          await db.collection('documentos').add(data);
        }
        closeDocModal();
        await loadDocs();
        showToast('Guardado', 'El documento se guardó correctamente.', 'fa-check');
      } catch (e) {
        showToast('Error', 'No se pudo guardar: ' + (e.message || e), 'fa-triangle-exclamation');
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Guardar';
      }
    }

    async function deleteDoc(id) {
      if (!esAdmin) return;
      const d = docs.find(x => x.id === id);
      if (!confirm('¿Eliminar "' + (d ? d.name : 'este documento') + '"?')) return;
      try {
        if (d && d.storagePath) { try { await storage.ref(d.storagePath).delete(); } catch (e) {} }
        await db.collection('documentos').doc(id).delete();
        await loadDocs();
      } catch (e) { showToast('Error', 'No se pudo eliminar: ' + (e.message || e), 'fa-triangle-exclamation'); }
    }

    async function loadDocs() {
      const list = document.getElementById('docList');
      list.innerHTML = '<div class="pa-empty"><i class="fas fa-spinner fa-spin" style="font-size:1.5rem"></i></div>';
      try {
        const q = await db.collection('documentos').get();
        docs = q.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
        renderDocs();
      } catch (e) { list.innerHTML = '<p class="pa-empty" style="color:#c0392b">No se pudieron cargar los documentos.</p>'; }
    }
    function showToast(t, m, i = 'fa-bell') {
      const c = document.getElementById('toastContainer'), toast = document.createElement('div');
      toast.className = 'toast'; toast.innerHTML = `<div class="toast-icon"><i class="fas ${i}"></i></div><div class="toast-content"><strong>${t}</strong><p>${m}</p></div>`;
      c.appendChild(toast); setTimeout(() => { toast.classList.add('hiding'); setTimeout(() => toast.remove(), 300); }, 4000);
    }

    auth.onAuthStateChanged(async u => {
      if (!u) { tpShow('tpAuth'); return; }
      let prof = {};
      try { const d = await db.collection('users').doc(u.uid).get(); prof = d.exists ? d.data() : {}; } catch (e) { prof = {}; }
      esAdmin = (prof.email || u.email || '').toLowerCase() === ADMIN_EMAIL;
      if (prof.status !== 'approved' && !esAdmin) {
        document.getElementById('tpAuthTitle').textContent = 'Cuenta pendiente';
        document.getElementById('tpAuthMsg').textContent = 'Tu cuenta esta pendiente de aprobacion.';
        tpShow('tpAuth'); return;
      }
      document.getElementById('docAddBtn').style.display = esAdmin ? 'inline-flex' : 'none';
      tpShow('tpContent');
      loadDocs();
    });
  </script>
</body>
</html>
