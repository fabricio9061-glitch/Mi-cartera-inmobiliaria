<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitudes de venta · MALAVÉ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{ --gold:#c9a227; --ink:#1c1c1c; --bg:#f4f5f7; --line:#e4e6ea; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--ink); padding:18px; }
    .wrap{ max-width:860px; margin:0 auto; }
    .top{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
    .top h1{ font-size:1.5rem; display:flex; align-items:center; gap:10px; }
    .top h1 i{ color:var(--gold); }
    .top-actions{ display:flex; gap:10px; align-items:center; }
    .back{ color:#666; text-decoration:none; font-size:.9rem; display:inline-flex; align-items:center; gap:6px; }
    .back:hover{ color:var(--ink); }
    .btn{ border:none; cursor:pointer; border-radius:10px; padding:9px 14px; font-size:.88rem; font-weight:600; display:inline-flex; align-items:center; gap:7px; text-decoration:none; }
    .btn-ghost{ background:#fff; border:1px solid var(--line); color:#444; }
    .countbar{ background:#fffdf5; border:1px solid var(--line); border-left:4px solid var(--gold); border-radius:12px; padding:12px 16px; font-weight:700; display:flex; align-items:center; gap:9px; margin-bottom:14px; color:#9a7d12; }
    .countbar.none{ border-left-color:#2ecc71; color:#27ae60; background:#fff; }
    .chips{ display:flex; gap:6px; background:#fff; border:1px solid var(--line); border-radius:12px; padding:4px; margin-bottom:16px; width:fit-content; flex-wrap:wrap; }
    .chip{ border:none; background:transparent; cursor:pointer; border-radius:9px; padding:7px 14px; font-size:.85rem; font-weight:600; color:#666; }
    .chip.active{ background:var(--ink); color:#fff; }
    .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; }
    .card-h{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .nombre{ font-weight:700; font-size:1.05rem; }
    .when{ color:#999; font-size:.82rem; }
    .badge{ margin-left:auto; font-size:.72rem; font-weight:700; padding:4px 10px; border-radius:20px; }
    .badge.nuevo{ background:#fff4e0; color:#b9770f; }
    .badge.contactado{ background:#e7f7ec; color:#1f9d54; }
    .badge.archivado{ background:#eef0f3; color:#888; }
    .rows{ display:flex; flex-direction:column; gap:7px; }
    .row{ display:flex; gap:10px; font-size:.9rem; align-items:flex-start; }
    .row i{ color:var(--gold); width:18px; text-align:center; margin-top:3px; }
    .row .lbl{ color:#888; min-width:74px; }
    .row .val{ color:var(--ink); flex:1; }
    .row a{ color:#2e86de; text-decoration:none; }
    .msg{ background:#f8f9fb; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:.9rem; color:#444; margin-top:4px; line-height:1.5; }
    .card-f{ display:flex; gap:8px; justify-content:flex-end; margin-top:14px; padding-top:12px; border-top:1px solid var(--line); flex-wrap:wrap; }
    .act{ border:none; cursor:pointer; border-radius:9px; padding:8px 13px; font-size:.83rem; font-weight:600; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
    .act-wa{ background:#25d366; color:#fff; }
    .act-ok{ background:#27ae60; color:#fff; }
    .act-arch{ background:#eef0f3; color:#666; }
    .empty{ text-align:center; color:#999; padding:40px 20px; background:#fff; border:1px solid var(--line); border-radius:14px; }
    #mvToastWrap{ position:fixed; right:16px; bottom:16px; z-index:99999; display:flex; flex-direction:column; gap:10px; max-width:360px; }
    .mv-toast{ background:var(--ink); color:#fff; border-left:4px solid var(--gold); border-radius:12px; padding:12px 14px; box-shadow:0 8px 24px rgba(0,0,0,.3); opacity:0; transform:translateY(10px); transition:.25s; font-size:.9rem; }
    .mv-toast.show{ opacity:1; transform:translateY(0); }
    .mv-toast.err{ border-left-color:#e74c3c; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1><i class="fas fa-inbox"></i> Solicitudes de venta</h1>
      <div class="top-actions">
        <a class="back" href="index.html"><i class="fas fa-arrow-left"></i> Volver</a>
        <button class="btn btn-ghost" onclick="cargar()"><i class="fas fa-rotate-right"></i> Actualizar</button>
      </div>
    </div>

    <div id="loadingState" class="empty"><i class="fas fa-spinner fa-spin"></i> Cargando…</div>
    <div id="authState" class="empty" style="display:none"><i class="fas fa-lock" style="font-size:1.6rem;color:#ccc;display:block;margin-bottom:10px"></i><span id="authMsg">Esta sección es solo para el administrador.</span></div>

    <div id="content" style="display:none">
      <div id="countBar" class="countbar"></div>
      <div class="chips">
        <button class="chip active" id="chip-nuevo" onclick="setFiltro('nuevo')">Nuevas</button>
        <button class="chip" id="chip-contactado" onclick="setFiltro('contactado')">Contactadas</button>
        <button class="chip" id="chip-archivado" onclick="setFiltro('archivado')">Archivadas</button>
        <button class="chip" id="chip-todos" onclick="setFiltro('todos')">Todas</button>
      </div>
      <div id="lista"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDnCQLlJuBtZqXNwYILio9a8ltb972bXzQ",
      authDomain: "mi-cartera-inmobiliaria.firebaseapp.com",
      projectId: "mi-cartera-inmobiliaria",
      storageBucket: "mi-cartera-inmobiliaria.firebasestorage.app",
      messagingSenderId: "923595024127",
      appId: "1:923595024127:web:b7104adcba6387a5a84eca"
    };
    const ADMIN_EMAIL = "fabricio9061@gmail.com";
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const TIPO_LBL = { casa:'Casa', apartamento:'Apartamento', terreno:'Terreno', local:'Local', oficina:'Oficina', galpon:'Galpón', campo:'Campo', otro:'Otro', '':'' };
    let leads = [], filtro = 'nuevo';

    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function show(id){ ['loadingState','authState','content'].forEach(x=>{ const e=document.getElementById(x); if(e) e.style.display = x===id?'block':'none'; }); }
    function toast(msg, err){
      let c=document.getElementById('mvToastWrap'); if(!c){ c=document.createElement('div'); c.id='mvToastWrap'; document.body.appendChild(c); }
      const t=document.createElement('div'); t.className='mv-toast'+(err?' err':''); t.textContent=msg; c.appendChild(t);
      setTimeout(()=>t.classList.add('show'),10); setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); },3600);
    }
    function fmtFecha(v){
      let d;
      if(!v) return '';
      if(typeof v==='object' && typeof v.toDate==='function') d=v.toDate();
      else if(typeof v==='object' && v.seconds) d=new Date(v.seconds*1000);
      else d=new Date(v);
      if(isNaN(d.getTime())) return '';
      return d.toLocaleString('es-UY',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    }
    function fechaMs(v){
      if(!v) return 0;
      if(typeof v==='object' && typeof v.toDate==='function') return v.toDate().getTime();
      if(typeof v==='object' && v.seconds) return v.seconds*1000;
      const d=new Date(v); return isNaN(d.getTime())?0:d.getTime();
    }
    function waNumber(tel){
      let d=String(tel||'').replace(/\D/g,'');
      if(!d) return '';
      if(d.indexOf('598')===0) return d;
      if(d.charAt(0)==='0') d=d.slice(1);
      if(d.length<=9) return '598'+d;
      return d;
    }

    function cardHTML(l){
      const est = l.estado || 'nuevo';
      const wa = waNumber(l.telefono);
      let rows = '';
      rows += '<div class="row"><i class="fas fa-phone"></i><span class="lbl">Teléfono</span><span class="val">'+esc(l.telefono||'—')+'</span></div>';
      if(l.email) rows += '<div class="row"><i class="fas fa-envelope"></i><span class="lbl">Email</span><span class="val"><a href="mailto:'+esc(l.email)+'">'+esc(l.email)+'</a></span></div>';
      if(l.tipo) rows += '<div class="row"><i class="fas fa-building"></i><span class="lbl">Quiere</span><span class="val">'+esc(TIPO_LBL[l.tipo]||l.tipo)+'</span></div>';
      if(l.zona) rows += '<div class="row"><i class="fas fa-location-dot"></i><span class="lbl">Zona</span><span class="val">'+esc(l.zona)+'</span></div>';
      if(l.mensaje) rows += '<div class="row"><i class="fas fa-comment"></i><span class="lbl">Mensaje</span><span class="val"><div class="msg">'+esc(l.mensaje)+'</div></span></div>';

      let foot = '';
      if(wa) foot += '<a class="act act-wa" href="https://wa.me/'+wa+'" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>';
      if(est!=='contactado') foot += '<button class="act act-ok" onclick="marcar(\''+l.id+'\',\'contactado\')"><i class="fas fa-check"></i> Marcar contactada</button>';
      if(est!=='archivado') foot += '<button class="act act-arch" onclick="marcar(\''+l.id+'\',\'archivado\')"><i class="fas fa-box-archive"></i> Archivar</button>';
      else foot += '<button class="act act-arch" onclick="marcar(\''+l.id+'\',\'nuevo\')"><i class="fas fa-rotate-left"></i> Reabrir</button>';

      return '<div class="card">'
        + '<div class="card-h"><span class="nombre">'+esc(l.nombre||'(sin nombre)')+'</span>'
        + '<span class="when">'+esc(fmtFecha(l.createdAt))+'</span>'
        + '<span class="badge '+est+'">'+ (est==='nuevo'?'Nueva':est==='contactado'?'Contactada':'Archivada') +'</span></div>'
        + '<div class="rows">'+rows+'</div>'
        + '<div class="card-f">'+foot+'</div>'
        + '</div>';
    }

    function render(){
      const recs = leads.filter(l => filtro==='todos' || (l.estado||'nuevo')===filtro);
      const nuevas = leads.filter(l => (l.estado||'nuevo')==='nuevo').length;
      const cb = document.getElementById('countBar');
      cb.className = 'countbar' + (nuevas>0 ? '' : ' none');
      cb.innerHTML = nuevas>0
        ? '<i class="fas fa-bell"></i> '+nuevas+(nuevas===1?' solicitud nueva sin contactar':' solicitudes nuevas sin contactar')
        : '<i class="fas fa-circle-check"></i> No hay solicitudes nuevas pendientes';
      const list=document.getElementById('lista');
      if(!recs.length){ list.innerHTML='<div class="empty">No hay solicitudes en esta categoría.</div>'; return; }
      list.innerHTML = recs.map(cardHTML).join('');
    }

    function setFiltro(f){
      filtro=f;
      ['nuevo','contactado','archivado','todos'].forEach(x=>document.getElementById('chip-'+x).classList.toggle('active', x===f));
      render();
    }

    async function cargar(){
      show('content');
      const list=document.getElementById('lista');
      list.innerHTML='<div class="empty"><i class="fas fa-spinner fa-spin"></i> Cargando…</div>';
      try{
        const q = await db.collection('leadsVenta').get();
        leads = q.docs.map(d=>({ id:d.id, ...d.data() }));
        leads.sort((a,b)=> fechaMs(b.createdAt) - fechaMs(a.createdAt));
        render();
      }catch(e){
        console.warn('cargar leads', e);
        const msg = (e && e.code==='permission-denied')
          ? 'Sin permiso para leer las solicitudes. Falta agregar la regla de Firestore para "leadsVenta".'
          : ('No se pudieron cargar las solicitudes. ' + (e.message||e));
        list.innerHTML='<div class="empty" style="color:#c0392b">'+esc(msg)+'</div>';
      }
    }

    async function marcar(id, estado){
      try{
        await db.collection('leadsVenta').doc(id).update({ estado: estado });
        const l = leads.find(x=>x.id===id); if(l) l.estado=estado;
        render();
        toast(estado==='contactado'?'Marcada como contactada':estado==='archivado'?'Archivada':'Reabierta');
      }catch(e){
        toast('No se pudo actualizar: ' + (e.message||e), true);
      }
    }

    auth.onAuthStateChanged(async u=>{
      if(!u){ show('authState'); document.getElementById('authMsg').textContent='Tenés que iniciar sesión.'; return; }
      let prof={};
      try{ const d=await db.collection('users').doc(u.uid).get(); prof=d.exists?d.data():{}; }catch(e){}
      const isAdmin = (prof.email || u.email || '').toLowerCase()===ADMIN_EMAIL;
      if(!isAdmin){ show('authState'); document.getElementById('authMsg').textContent='Esta sección es solo para el administrador.'; return; }
      cargar();
    });
  </script>
</body>
</html>
